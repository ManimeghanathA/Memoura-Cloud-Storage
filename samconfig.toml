version = 0.1

# -------------------------------------------------------------
# GLOBAL PARAMETERS (Applied to both environments)
# -------------------------------------------------------------
[default.global.parameters]
region = "us-east-1"
confirm_changeset = "False"
capabilities = "CAPABILITY_IAM"
disable_rollback = "False"


# -------------------------------------------------------------
# DEFAULT / PROD ENVIRONMENT (Your current working version)
# -------------------------------------------------------------
[default]
[default.deploy]
[default.deploy.parameters]
stack_name = "timeboundstoragestack-main" # Keeping the original, simple name
# region is inherited from [default.global.parameters]
s3_prefix = "timeboundstoragestack-main"
# capabilities, confirm_changeset, disable_rollback inherited/explicitly set
resolve_s3 = true
image_repositories = []
