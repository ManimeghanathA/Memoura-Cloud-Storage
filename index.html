    <script>
        const htmlElement = document.documentElement;
        const toggleButton = document.getElementById('theme-toggle');
        const iconElement = document.getElementById('theme-icon');

        
        // 1. Initial Load: Check localStorage or system preference
        function loadTheme() {
            const storedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

            if (storedTheme === 'dark' || (!storedTheme && prefersDark)) {
                setTheme('dark');
            } else {
                setTheme('light');
            }
        }

        // 2. Apply Theme
        function setTheme(theme) {
            if (theme === 'dark') {
                htmlElement.classList.add('dark');
                iconElement.textContent = 'light_mode'; // Show sun icon to switch to light
                localStorage.setItem('theme', 'dark');
            } else {
                htmlElement.classList.remove('dark');
                iconElement.textContent = 'dark_mode'; // Show moon icon to switch to dark
                localStorage.setItem('theme', 'light');
            }
        }

        // 3. Toggle Handler
        toggleButton.addEventListener('click', () => {
            const newTheme = htmlElement.classList.contains('dark') ? 'light' : 'dark';
            setTheme(newTheme);
        });

        document.addEventListener("DOMContentLoaded", () => {
        // Fade in when page loads
        document.body.classList.add("fade-in");

        // For all internal links, add fade-out before leaving
        document.querySelectorAll("a").forEach(link => {
            if (link.hostname === window.location.hostname) {
            link.addEventListener("click", e => {
                e.preventDefault();
                const href = link.getAttribute("href");

                // Fade out current page
                document.body.classList.remove("fade-in");
                document.body.style.opacity = 0;

                // After transition, go to next page
                setTimeout(() => {
                window.location.href = href;
                }, 400);
            });
            }
        });
        });

        // Load the theme when the page loads
        loadTheme();
    </script>
