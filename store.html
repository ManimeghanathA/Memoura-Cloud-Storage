<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Memoura - Store Data Securely & Ephemerally</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Arvo:wght@700&display=swap"

    <style>
        /* ===========================
         * 🌗 THEME BASE & UTILITIES
         * =========================== */
        .page-bg { background-color: #f7f7f7; }
        .dark .page-bg { background-color: #121212; }

        /* Icon Fix */
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined'; font-weight: normal; font-style: normal; font-size: 24px; line-height: 1; letter-spacing: normal;
            text-transform: none; display: inline-block; white-space: nowrap; word-wrap: normal; direction: ltr;
            -webkit-font-feature-settings: 'liga'; -webkit-font-smoothing: antialiased;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin {
            animation: spin 1s linear infinite;
        }
        
        /* ===========================
         * 🌟 Starry Background Styles
         * =========================== */
        @keyframes slowRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        #star-field {
            position: fixed; /* FIX: Prevents scroll/whitespace bug */
            top: 0; left: 0; right: 0; bottom: 0;
            transform-origin: center center;
            animation: slowRotate 500s linear infinite;
            z-index: 0;
        }
        .star {
            position: absolute; border-radius: 50%;
            background-color: #000000;
            transition: background-color 0.5s;
        }
        .dark .star { background-color: #ffffff; }

        /* ===========================
         * 🧾 INPUT + TEXTAREA STYLING (Finalized Smaller Size)
         * =========================== */
        /* Universal Input Styles (Smaller size for cleaner fit) */
        input[type="text"], input[type="password"], textarea, select, input[type="file"] {
            /* Reduced padding and smaller font for tighter fit (Point 3) */
            border: 1px solid #d1d5db; background-color: #ffffff; color: #000000; 
            border-radius: 0.5rem; transition: all 0.2s ease; 
            padding: 0.5rem 0.75rem; /* Reduced padding */
            font-size: 1rem; /* Slightly smaller than base (1rem) */
        }
        .dark input[type="text"], .dark input[type="password"], .dark textarea, .dark select, .dark input[type="file"] {
            border: 1px solid #374151; background-color: #1f2937; color: #ffffff; 
        }

        /* Mode Button Hover Style (Point 2: Scale Only) */
        .mode-button-style {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .mode-button-style:hover {
            transform: scale(1.03); 
        }
        
        /* Modal Styles (Point 4) */
        .modal-content { 
            @apply bg-white dark:bg-gray-950 text-gray-900 dark:text-white rounded-xl shadow-xl dark:border dark:border-gray-700; 
        }
        .result-row { 
            @apply border border-gray-200 dark:border-gray-800 rounded-lg bg-gray-50 dark:bg-gray-800; 
        }
        /* Lock State */
        #store-section { position: relative; z-index: 10; }
        #store-section.locked form { opacity: 0.5; pointer-events: none; }

        /* Code Block Styles (Retained) */
        .code-block-wrapper { position: relative; margin: 15px 0; border-radius: 6px; overflow: hidden; }
        
                /* Start page invisible */
        body {
        opacity: 0;
        transition: opacity 0.5s ease;
        }

        /* When ready, fade in */
        body.fade-in {
        opacity: 1;
        } 

    </style>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-text": "#000000",
                        "background-light": "#f7f7f7",
                        "background-dark": "#121212",
                        "gray-950": "#0a0a0a"

                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "xxl": "1.5rem", "3xl": "2rem", "full": "9999px" },
                },

        }
    </script>

                [2, 95, 45], [3, 98, 55], [2, 93, 50], [4, 18, 10], [3, 10, 75], [4, 80, 25], [3, 70, 90], [5, 90, 45],
                [4, 92, 55], [3, 94, 60], [4, 96, 40], [3, 98, 35], [4, 90, 70], [3, 95, 10], [4, 93, 85],
                [1, 5, 5], [1, 95, 5], [1, 5, 95], [1, 95, 90], [1, 2, 50], [1, 98, 50], [1, 50, 2], [1, 50, 98],
                [2, 12, 40], [2, 88, 60], [2, 40, 12], [2, 60, 88], [3, 70, 30], [3, 30, 70], [2, 25, 25], [2, 75, 75],
                [1, 15, 55], [1, 85, 45], [1, 45, 15], [1, 55, 85], [2, 3, 80], [2, 97, 20], [2, 20, 97], [2, 80, 3],
                [3, 5, 30], [3, 95, 70], [2, 10, 50], [2, 90, 50], [2, 50, 10], [2, 50, 90], [1, 44, 44], [1, 56, 56],
                [1, 7, 7], [1, 93, 93], [1, 4, 30], [1, 96, 70], [2, 50, 5], [2, 50, 95], [2, 10, 50], [2, 90, 50]

            const starContainer = document.currentScript.parentElement;
            stars.forEach(s => starContainer.appendChild(createStar(s[0], s[1], s[2])));

                            </svg>
                            
                        </div>
                        <!-- TITLE CONTAINER: Align Memoura closer to the logo (gap-1 is added below) -->
                        <h1 class="text-3xl font-extrabold leading-tight tracking-[-0.015em]" style="font-family: 'Arvo', serif;">
                            Memoura

                    </a>
                </div>

                <!-- THEME TOGGLE BUTTON (RIGHT SIDE) -->

                    class="flex items-center justify-center size-10 rounded-full text-black/80 dark:text-white/80 hover:bg-black/10 dark:hover:bg-white/10 transition-colors">

        <!-- Main Content Area -->

                       dark:bg-gray-950 dark:shadow-none dark:border-4 dark:border-gray-700 
                       text-gray-900 dark:text-white" 
                style="position: relative; z-index: 10;">
                
                <!-- 2. Store Data Title: Centered and Bigger (Point 2) -->
                <h2 class="text-4xl md:text-5xl font-extrabold mb-8 pb-3 text-center border-b border-gray-200 dark:border-gray-800">Store Data</h2>

                <!-- 3. Mode Buttons: Strict Black/White Theme, Expanded (Point 3) -->
                <div class="mode-selection flex flex-col sm:flex-row gap-4 mb-6 justify-stretch">
                    
                    <button onclick="setMode('TEXT')" id="mode-text" 
                        class="mode-button-style flex-1 w-full sm:w-auto px-4 py-3 rounded-xl font-bold border-2">
                        Text Only
                    </button>
                    
                    <button onclick="setMode('FILE')" id="mode-file"
                        class="mode-button-style flex-1 w-full sm:w-auto px-4 py-3 rounded-xl font-bold border-2">
                        File Only
                    </button>
                    
                    <button onclick="setMode('HYBRID')" id="mode-hybrid"
                        class="mode-button-style flex-1 w-full sm:w-auto px-4 py-3 rounded-xl font-bold border-2">
                        Hybrid
                    </button>
                </div>
                <p class="mb-6 text-sm text-center">Current Mode: <strong id="current-mode" class="font-semibold text-base">HYBRID</strong></p>

                <!-- Custom Key Input - Smaller Content -->
                <div class="mb-6">
                    <label for="custom-key" class="block text-base font-medium mb-1">Custom Key (Required):</label>
                    <input type="text" id="custom-key" required placeholder="Enter your unique key (e.g., myproject-v1)" 
                           class="w-full rounded-lg focus:ring-blue-500 focus:border-blue-500">
                    <p id="status-message" class="text-red-500 dark:text-red-400 mt-2 text-left font-medium text-sm"></p>
                </div>
                
                <form id="store-form" class="space-y-4"> <!-- Reduced spacing -->

                    <div id="format-controls" class="hidden">
                        <button type="button" id="format-button" 
                            class="w-full py-2.5 font-semibold rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed text-base 
                                bg-black text-white hover:bg-gray-800 dark:bg-white dark:text-black dark:hover:bg-gray-200 border border-transparent dark:border-black">
                            Format with AI ✨
                        </button>
                        <p id="format-status" class="text-xs mt-2"></p>
                    </div>

                    <!-- Text Group - Smaller Content -->
                    <div id="text-group" class="space-y-2">
                        <label for="content" class="block text-base font-medium mb-1">Text/Code Content (Markdown Supported):</label>
                        <textarea id="content" rows="10" placeholder="Paste your text or code here..." class="w-full rounded-lg text-sm"></textarea>
                    </div>

                    <!-- File Group - Smaller Content -->
                    <div id="file-group" class="space-y-2">
                        <label for="file-input" class="block text-base font-medium">File Upload (Multiple Supported):</label>
                        <input type="file" id="file-input" multiple 
                               class="w-full border rounded-lg file:mr-4 file:py-1.5 file:px-3 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    </div>

                    <!-- Password Input - Smaller Content -->
                    <div>
                        <label for="password" class="block text-base font-medium mb-1">Password (Optional):</label>
                        <div class="flex items-center space-x-2">
                            <input type="password" id="password" placeholder="Enter optional password" class="flex-grow rounded-lg">
                            <button type="button" onclick="togglePasswordVisibility('password')" class="px-3 py-1.5 text-sm rounded-lg bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 hover:bg-gray-300 transition-colors">Show</button>
                        </div>
                    </div>

                    <!-- Lifetime - Smaller Content -->
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                        <div class="w-full sm:w-1/2">
                            <label for="lifetime_days" class="block text-sm font-medium mb-1">Lifetime:</label>
                            <select id="lifetime_days" class="w-full rounded-lg text-sm">
                                <option value="0.01041666666">15 Minutes</option>
                                <option value="0.02083333333">30 Minutes</option>
                                <option value="0.04166666666">1 Hour</option>
                                <option value="0.25">6 Hours</option>
                                <option value="0.5">12 Hours</option>
                                <option value="1" selected>1 Day</option>
                                <option value="3">3 Days</option>
                                <option value="7">7 Days</option>
                                <option value="10">10 Days</option>
                                <option value="30">1 Month</option>
                            </select>
                        </div>
                        <div class="w-full sm:w-1/2 pt-6 sm:pt-4">
                            <input type="checkbox" id="one_time_access" class="rounded text-red-600 focus:ring-red-500">
                            <label for="one_time_access" class="text-sm font-medium ml-2 select-none">One-Time Access (Auto-Delete)</label>
                        </div>
                    </div>

                    <button type="submit" class="w-full py-3 bg-green-600 text-white font-bold text-base rounded-lg hover:bg-green-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        Store Securely
                    </button>
                </form>

            </section>

            <div id="final-source-selection" class="hidden mt-4 text-center text-base font-medium">
                <!-- These IDs are referenced directly by showPreviewContent() -->
                <input type="radio" name="final_source" value="raw" id="source-raw" checked class="rounded text-blue-600 focus:ring-blue-500"> 
                <label for="source-raw" class="mr-6 text-gray-700 dark:text-gray-300">Select Original</label>
                
                <input type="radio" name="final_source" value="formatted" id="source-formatted" class="rounded text-blue-600 focus:ring-blue-500"> 
                <label for="source-formatted" class="text-gray-700 dark:text-gray-300">Select Formatted</label>
            </div>

            <section id="preview-section" 
                class="hidden mt-8 bg-white shadow-2xl p-6 md:p-10 rounded-3xl border border-gray-100 
                    dark:bg-gray-950 dark:shadow-none dark:border-4 dark:border-gray-700 
                    text-gray-900 dark:text-white" 
                style="position: relative; z-index: 10;">

                <h2 class="text-xl font-bold mb-4">AI Formatting Preview 🤖</h2> 
                
                <div id="preview-tabs" class="flex border-b border-gray-200 dark:border-gray-700 mb-4">
                    <!-- Buttons are dynamically styled by JS -->
                    <button id="tab-formatted" onclick="window.showPreviewContent('formatted')" class="px-3 py-1.5 text-sm font-medium border-b-2 border-transparent transition-colors">Formatted</button>
                    <button id="tab-raw" onclick="window.showPreviewContent('raw')" class="px-3 py-1.5 text-sm font-medium border-b-2 border-transparent transition-colors">Original</button>
                </div>
                
                <p id="preview-timer" class="text-red-600 dark:text-red-400 font-bold mb-4 text-sm"></p>
                
                <!-- Content rendering area -->
                <div id="preview-content-area" class="min-h-[200px] overflow-auto retrieved-data-container rounded-lg border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 p-4 mt-4">
                    Loading preview...
                </div>
                
                <!-- Hidden radio buttons now live outside this section for JS stability -->
            </section>

        </main>
        
    </div>

    <div id="success-modal" class="modal-overlay hidden fixed inset-0 z-[1000] bg-black/70 flex items-center justify-center" style="display: none;">
        <!-- Modal content: Black BG, White Text, Strong Border Radius -->
        <div class="modal-content bg-black p-8 rounded-3xl max-w-lg w-full mx-4 shadow-2xl animate-fade-in border border-gray-700">
            
            <!-- Point 6: New Title and Subtitle -->
            <h2 class="text-3xl font-extrabold text-white mb-2 text-center">Data Stored Successfully!</h2>
            
            <p class="text-sm mb-6 text-gray-300 text-center">
                Share your file with the data below. Thank you for using!
                <!-- Point 7: "Thank You for using!" is included here. -->
            </p>

            <!-- The content blocks below follow the new black/white theme. -->
            
            <!-- Unique Key / Copy Button (Black/White Theme - Point 2) -->
            <div class="result-row flex items-center justify-between mb-4 p-3 rounded-xl bg-gray-900 dark:bg-gray-800">
                <span class="font-semibold text-base whitespace-nowrap mr-4 text-white">Unique Key:</span>
                <strong id="modal-result-key" class="break-all ml-4 font-mono text-base text-white"></strong>
                <!-- Point 4: Copy Button Sizing & Spacing -->
                <button class="copy-btn px-4 py-2 text-sm font-semibold rounded-lg transition-colors 
                            bg-white text-black hover:bg-gray-200 dark:bg-white dark:text-black dark:hover:bg-gray-200" data-copy-target="modal-result-key">Copy Key</button>
            </div>

            <!-- Share URL / Copy Button (Black/White Theme - Points 2, 3, 4) -->
            <div class="result-row flex items-start justify-between gap-2 mb-6 p-3 rounded-xl bg-gray-900 dark:bg-gray-800">
                <!-- Left side column (URL label and actual link) -->
                <div class="flex flex-col flex-grow min-w-0">
                    <span class="font-semibold text-base text-white mb-1">Share URL:</span>
                    <!-- URL content should break to fit -->
                    <a id="modal-share-url" target="_blank" href="#" class="break-all text-sm text-blue-400 hover:underline min-w-0">Loading...</a>
                </div>
                
                <!-- Right side column (The fixed-size button) -->
                <!-- Point 4: Copy Button Sizing & Spacing - Ensure button size consistency -->
                <button class="copy-btn shrink-0 px-4 py-2 text-sm font-semibold rounded-lg transition-colors 
                            bg-white text-black hover:bg-gray-200 dark:bg-white dark:text-black dark:hover:bg-gray-200" 
                        data-copy-target="modal-share-url">Copy URL</button>
</div>

            <p id="modal-file-message" class="text-sm text-center font-medium mb-4 text-gray-400"></p>

            <!-- Point 5: Close Button (White text on Black BG) -->
            <button onclick="document.getElementById('success-modal').style.display='none';" 
                    class="w-full py-3 bg-white text-black font-semibold rounded-lg hover:bg-gray-200 transition-colors">
                Close and Continue
            </button>
        </div>
    </div>
    
    <!-- External Scripts -->
    <script src="highlight.min.js"></script> 
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/lib/marked.umd.min.js"></script> 
    
    <!-- Theme Management (Retained) -->
    <script>
        const htmlElement = document.documentElement;
        function loadTheme() {
            const storedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (storedTheme === 'dark' || (!storedTheme && prefersDark)) {
                htmlElement.classList.add('dark');
            } else {
                htmlElement.classList.remove('dark');
            }
            updateThemeUI();
        }
        function setTheme(theme) {
            if (theme === 'dark') {
                htmlElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            } else {
                htmlElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            }
            updateThemeUI();
        }
        function updateThemeUI() {
            const iconElement = document.getElementById('theme-icon');
            if (iconElement) {
                iconElement.textContent = htmlElement.classList.contains('dark') ? 'light_mode' : 'dark_mode';
            }
            // Trigger mode button update on theme change
            if (typeof window.updateModeButtonStyles === 'function') {
                window.updateModeButtonStyles();
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            const toggleButton = document.getElementById('theme-toggle');
            if (toggleButton) {
                toggleButton.addEventListener('click', () => {
                    const newTheme = htmlElement.classList.contains('dark') ? 'light' : 'dark';
                    setTheme(newTheme);
                });
            }
        });

        document.addEventListener("DOMContentLoaded", () => {
        // Fade in when page loads
        document.body.classList.add("fade-in");

        // For all internal links, add fade-out before leaving
        document.querySelectorAll("a").forEach(link => {
            if (link.hostname === window.location.hostname) {
            link.addEventListener("click", e => {
                e.preventDefault();
                const href = link.getAttribute("href");

                // Fade out current page
                document.body.classList.remove("fade-in");
                document.body.style.opacity = 0;

                // After transition, go to next page
                setTimeout(() => {
                window.location.href = href;
                }, 400);
            });
            }
        });
        });

    </script>
    
    <!-- Main Application Logic -->
    <script src="store.js?v=101"></script>
</body>
