    <style>
        /* ===========================
         * 🌗 THEME BASE & UTILITIES
         * =========================== */
        .page-bg { background-color: #f7f7f7; }
        .dark .page-bg { background-color: #121212; }

        /* Icon Fix */
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined'; font-weight: normal; font-style: normal; font-size: 24px; line-height: 1; letter-spacing: normal;
            text-transform: none; display: inline-block; white-space: nowrap; word-wrap: normal; direction: ltr;
            -webkit-font-feature-settings: 'liga'; -webkit-font-smoothing: antialiased;
        }
        
        /* ===========================
         * 🌟 Starry Background Styles
         * =========================== */
        @keyframes slowRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        #star-field {
            position: fixed; /* FIX: Prevents scroll/whitespace bug */
            top: 0; left: 0; right: 0; bottom: 0;
            transform-origin: center center;
            animation: slowRotate 400s linear infinite;
            z-index: 0;
        }
        .star {
            position: absolute; border-radius: 50%;
            background-color: #000000;
            transition: background-color 0.5s;
        }
        .dark .star { background-color: #ffffff; }

        /* ===========================
         * 🧾 INPUT + TEXTAREA STYLING 
         * =========================== */
        input[type="text"], input[type="password"], textarea, select {
            border: 1px solid #d1d5db; background-color: #ffffff; color: #000000; 
            border-radius: 0.5rem; transition: all 0.2s ease; 
            padding: 0.5rem 0.75rem; 
            font-size: 1.125rem; /* text-lg */
        }
        .dark input[type="text"], .dark input[type="password"], .dark textarea, .dark select {
            border: 1px solid #374151; background-color: #1f2937; color: #ffffff; 
        }

        /* Result Content Area Styling */
        #content-preview, .retrieved-data-container {
            @apply border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 rounded-lg;
            padding: 1.5rem;
            margin-top: 1rem;
            word-wrap: break-word;
            overflow-x: auto;
        }

        /* Password Gate Styling */
        #password-gate {
            @apply bg-gray-50 dark:bg-gray-800 p-8 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 text-center;
        }

        /* Code Block Styles (Inherited from store.html) */
        .code-block-wrapper { position: relative; margin: 15px 0; border-radius: 6px; overflow: hidden; }
        #content-preview pre { padding: 0; margin: 0; position: relative; }
        #content-preview pre code { display: block; padding: 15px; overflow-x: auto; }
        .code-utility-bar { 
            display: flex; justify-content: flex-start; align-items: center; background-color: #3e3e3e; 
            color: #f1f1f1; padding: 5px 15px; font-size: 0.9em; height: 30px; 
        }
        .copy-icon-button { 
            position: absolute; top: 5px; right: 5px; background-color: rgba(0, 0, 0, 0.4); border: none; 
            border-radius: 4px; cursor: pointer; padding: 5px 8px; opacity: 0.8; z-index: 10; display: flex; align-items: center;
            transition: background-color 0.2s, opacity 0.2s;
        }
        .copy-icon-button:hover { background-color: #007bff; opacity: 1; }
        .copy-icon-button svg { width: 16px; height: 16px; fill: #f1f1f1; }

                /* Start page invisible */
        body {
        opacity: 0;
        transition: opacity .5s ease;
        }

        /* When ready, fade in */
        body.fade-in {
        opacity: 1;
        }

    <script>
        // ------------------ THEME INJECTION (Retained) ------------------
        const htmlElement = document.documentElement;
        function loadTheme() {
            const storedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (storedTheme === 'dark' || (!storedTheme && prefersDark)) {
                htmlElement.classList.add('dark');
            } else {
                htmlElement.classList.remove('dark');
            }
            // No need to call updateModeButtonStyles here as it's not present on this page
            const iconElement = document.getElementById('theme-icon');
            if (iconElement) {
                iconElement.textContent = htmlElement.classList.contains('dark') ? 'light_mode' : 'dark_mode';
            }
        }
        function setTheme(theme) {
            if (theme === 'dark') {
                htmlElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            } else {
                htmlElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            }
            const iconElement = document.getElementById('theme-icon');
            if (iconElement) {
                iconElement.textContent = htmlElement.classList.contains('dark') ? 'light_mode' : 'dark_mode';
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            const toggleButton = document.getElementById('theme-toggle');
            if (toggleButton) {
                toggleButton.addEventListener('click', () => {
                    const newTheme = htmlElement.classList.contains('dark') ? 'light' : 'dark';
                    setTheme(newTheme);
                });
            }
        });
        // Initialize Marked for markdown rendering
        marked.setOptions({
            gfm: true,
            breaks: true,
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            }
        });

        document.addEventListener("DOMContentLoaded", () => {
        // Fade in when page loads
        document.body.classList.add("fade-in");

        // For all internal links, add fade-out before leaving
        document.querySelectorAll("a").forEach(link => {
            if (link.hostname === window.location.hostname) {
            link.addEventListener("click", e => {
                e.preventDefault();
                const href = link.getAttribute("href");

                // Fade out current page
                document.body.classList.remove("fade-in");
                document.body.style.opacity = 0;

                // After transition, go to next page
                setTimeout(() => {
                window.location.href = href;
                }, 400);
            });
            }
        });
        });

    </script>
